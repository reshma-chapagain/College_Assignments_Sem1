<!DOCTYPE html>
<html>
<head>
    <title>Registration Validation</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<h2>Registration Validation</h2>

<button onclick="runValidation()">Validate Sample Data</button>

<div id="output"></div>

<script>

function validateRegistration(data) {
    const output = document.getElementById("output");
    output.innerHTML = "";   // clear previous messages

    try {

        // Name validation
        if (!data.name) {
            throw new Error("Name is required.");
        }

        if (typeof data.name !== "string") {
            throw new Error("Name must be a string.");
        }

        if (data.name.length < 2) {
            throw new Error("Name must be at least 2 characters long.");
        }

        // Email validation
        if (!data.email) {
            throw new Error("Email is required.");
        }

        if (!data.email.includes("@") || !data.email.includes(".")) {
            throw new Error("Email must contain '@' and '.'.");
        }

        // If all validations pass
        const successMsg = document.createElement("p");
        successMsg.textContent = "Registration Successful!";
        successMsg.classList.add("success");
        output.appendChild(successMsg);

    } catch (error) {

        const errorMsg = document.createElement("p");
        errorMsg.textContent = error.message;
        errorMsg.classList.add("error");
        output.appendChild(errorMsg);

    } finally {

        const finalMsg = document.createElement("p");
        finalMsg.textContent = "Validation process complete";
        output.appendChild(finalMsg);

    }
}

// Example function call
function runValidation() {
    const sampleData = {
        name: "Reshma",
        email: "reshma@gmail.com"
    };

    validateRegistration(sampleData);
}

</script>

</body>
</html>
