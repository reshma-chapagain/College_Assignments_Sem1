<!DOCTYPE html>
<html>
<head>
    <title>Get Post</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input {
            padding: 6px;
            width: 80px;
        }

        button {
            padding: 6px 12px;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<h3>
Post ID:
<input type="number" id="postId" min="1" max="100">
<button id="getPostBtn">Get Post</button>
</h3>

<hr>

<div id="result"></div>

<script>

const btn = document.getElementById("getPostBtn");
const result = document.getElementById("result");

btn.addEventListener("click", async function() {

    const id = document.getElementById("postId").value;

    result.innerHTML = "";

    // Input Validation
    if (!id || id < 1 || id > 100) {
        result.innerHTML = "<p class='error'>Please enter a valid number (1-100)</p>";
        return;
    }

    try {

        // First Fetch - Get Post
        const postResponse = await fetch(`https://jsonplaceholder.typicode.com/posts/${id}`);

        if (!postResponse.ok) {
            throw new Error("Post not found");
        }

        const post = await postResponse.json();

        // Second Fetch - Get Author using userId
        const userResponse = await fetch(`https://jsonplaceholder.typicode.com/users/${post.userId}`);

        if (!userResponse.ok) {
            throw new Error("Author not found");
        }

        const user = await userResponse.json();

        // Display Result
        result.innerHTML = `
            <h3>Title: ${post.title}</h3>
            <p><strong>Body:</strong> ${post.body}</p>
            <hr>
            <p><strong>Author:</strong> ${user.name}</p>
            <p><strong>Email:</strong> ${user.email}</p>
        `;

    } catch (error) {

        result.innerHTML = "<p class='error'>Failed to load data</p>";

    }

});

</script>

</body>
</html>
