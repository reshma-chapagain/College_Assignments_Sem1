<!DOCTYPE HTML>
<html lang ="en">
    <head> 
        <title>
            Marks
        </title>

    </head>

    <body>
    
            <label>Enter Your Marks</label>
            <input type = "number" id = "marks"><br><br>

            <button onclick = "calculate()"> SUBMIT</button>
            <p id = "result"></p>
    

        <script>
            function calculate() {
            let marks = document.getElementById ("marks").value; 
                let grade = "";


                if (marks >= 80) {
                    grade = "A";
                }

                else if (marks >= 60)
                {
                    grade = "B";
                }

                else if (marks >=40) {
                    grade = "c";
                }

                else {
                    grade = "fail";
                }

              document.getElementById("result").innerText = "Grade: " + grade;



            }
        

        </script>
    </body>
</html>
