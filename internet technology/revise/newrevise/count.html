<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type = "button" onclick = "like()"> Like Button</button>
    <p id = "result"></p>
    <script>
        let click = 0;
        function like() {
            click = click+ 1;
            document.getElementById("result").innerText = "you have " + click +"likes"
        }
    </script>
</body>
</html>
