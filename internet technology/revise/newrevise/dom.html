<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        fetch("https://api.example.com/user", {method:"GET"})
        .then(function(response) {
            return response.json();
        })

        .then(function(data)
    {
        document.getElementById("result").innerHTMl = data.name + "" + data.email;
    })

        .catch(function(error)
        {
            console.log("Error" +error);
        })
    </script>
</body>
</html>
