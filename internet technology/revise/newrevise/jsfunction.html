<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label> ENter 1 marks</label>
    <input type = "number" id = "marks1">
    <label> 2ns marks</label>
    <input type = "number" id = "marks2">
    <label> ENter 3 marks</label>
    <input type = "number" id = "marks3">
    <label> 4ns marks</label>
    <input type = "number" id = "marks4">
    <label> 5ns marks</label>
    <input type = "number" id = "marks5">
   
  <button type = "button" onclick = "calculate()"> Calculate </button>
    <p id = "result"></p>

    <script>
        function calculate() {
            let m1 = Number(document.getElementById("marks1").value);
            let m2 = Number(document.getElementById("marks2").value);
            let m3 = Number(document.getElementById("marks3").value);
            let m4 = Number(document.getElementById("marks4").value);
            let m5 = Number(document.getElementById("marks5").value);


            let total = m1 + m2 + m3 + m4 + m5 ;
            let avg = total / 5 ; 
            let grade;
            if (avg>90) {
                grade = "A"
            }

            else if (avg>=60) {
                grade = "B";
            }

            else if (avg >= 50) {
                grade = "C";
            }

            else {
                grade = "fail";
            }
            

            let output = (avg>= 50) ? "Pass" : "Fail";

            document.getElementById("result").innerHTML = "total is" + total  + "Average is" + avg + "grade is" + grade + "Output is" + output ;
        }
      
    </script>
</body>
</html>
