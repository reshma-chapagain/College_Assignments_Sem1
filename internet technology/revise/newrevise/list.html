<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type = "text"  id = "inputing">
    <button type = "button" onclick = "list()"> Add to List</button>
    <ul id ="result">
    </ul>

    <script>
       
        function list() {
           let item = document.getElementById("inputing").value;
            document.getElementById("result").innerHTML += "<li>" + item + "</li>"
        }
    </script>
</body>
</html>
