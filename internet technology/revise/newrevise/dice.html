<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type = "button" onclick = "roll()"> Roll Dice</button>
    <p id = "result"></p>
<script>
    function roll() {
        let num = Math.floor(Math.num() *6) +1;
        document.getElementById("result").innerHtml = "your roll is" + num;
    }
</script>
</body>
</html>
