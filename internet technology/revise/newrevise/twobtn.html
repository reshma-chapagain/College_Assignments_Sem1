<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <button type = "button"  onclick = "button1()">+</button>
   <button type = "button" onclick = "button2()"> - </button>
   <p id = "result"></p>

   <script>
    let count = 0;
    function button1() {
        count = count +1;
        document.getElementById("result").innerHTML = "count is" + count;
    }

    function button2() {
        count = count-1;
        document.getElementById("result").innerHTML = "count is" + count;
    }
   </script>
</body>
</html>
