<!DOCTYPE HTML>
<html>
    <head>
        <title> Hotel Booking Form</title>
    </head>
<body>
    <form>
        <h1> Hotel Booking Form</h1>
        <fieldset>
            <legend>Guest Information</legend>
            <label> Full Name</label>
            <input type = "text" placeholder="Enter your full name"><br><br>
            <label> Email</label>
            <input type = "email" placeholder = "Enter your last name"><br><br>
            <label> Phome</label>
            <input type = "tel" placeholder = "Enter your phone Number"><br><br>

        
        </fieldset>
        <fieldset>
            <legend> Booking Details</legend>
            <label> Check-In </label>
            <input type = "date"><br><br>
            <label> Check-Out</label>
            <input type = "date"><br><br>
            <label>Room type</label>
            <select>
                <option>SELECT ROOM TYPE</option>
                <option> Standard</option>
                <option>Deluxe</option>
                <option> Suite</option>
                <option>Presedential</option>
            </select>
            <br><br>
            <label> Guests:</label>
            <select>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
            </select><br><br>

            <label> Special Requests</label>
            <textarea> Any special Requests...</textarea>
        </fieldset>

        <fieldset>
            <legend> Payment Method</legend>
            <input type = "radio" Payment Method> Credit Card
            <input type = "radio" Payment Method> Debit Card
            <input type = "radio" Payment Method> Pay at Hotel
        </fieldset>

        <button> Sumbit</button>
        <button>Reset</button>
    </form>
</body>
