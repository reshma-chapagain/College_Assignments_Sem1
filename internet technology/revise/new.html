<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        
        font-family:Arial,sans-serif;
    }
    *{
        margin: 0;
        padding: 0;
    }
    nav{
        display:flex;
        background-color: gray;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        flex-wrap: wrap;

    }
    .logo{
        color: white;
        font-size: 1.8rem;
        font-weight: bold;
        padding: 15px 0;
    }
    .menu-toggle{
        display: none;
        
    }
    .nav-links{
        list-style: none;
        display: flex;
    }
    .nav-links li{
        display: block;
        padding: 18px 16px;
        text-decoration: none;
        color: #ccc;
    }
    @media (max-width:768px) {
        .menu-toggle {
            display: block;
            font-size: 1.8rem;
            color:white;
            background: none;
            border: none;
            cursor: pointer;
            padding: 15px 0;
        }

        .nav-links {
            flex-direction: column;
            width: 100%;
            display: none;
            background-color: antiquewhite;
        }

        .nav-links.open {
            display: flex;
        }
        .nav-links li a {
            text-align: center;
            padding: 14px;
            border-top: 1px solid #ccc;
        }
    }
    

</style>
<body>
    <nav>
        <div class="logo">DesignX</div>
        <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>
        <ul class="nav-links" id="navMenu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Feedback</a></li>
        </ul>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("navMenu");
            menu.classList.toggle("open");
        }
    </script>
</body>
</html>
