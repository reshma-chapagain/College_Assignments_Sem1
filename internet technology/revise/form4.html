<!DOCTYPE html>
<html>
    <head>
        <title> Form</title>
    </head>
    <body>
        <form method = "post">
            <h1> Registration Form</h1>
            <fieldset>
                <legend> Personal Info</legend>
                <label for = "name"> Name</label>
                <input type = "text" >
                <label> DOB</label>
                <input type = "date" >
                <label class = "gender"> Gender</label>
                <input type = "radio" class = "gender" id="male"> Male
                <input type = "radio" class = "gender" id = "female"> Female
            </fieldset>

            <fieldset> 
                <legend>
                    Contact
                </legend>
                <label> Phone</label>
                <input type = "tel">
                <label> Email</label>
                <input type = "number">
            </fieldset>

            <fieldset>
                <legend> Account</legend>
                <label> Username</label>
                <input type = "text">
                <label> Password</label>
                <input type = "password">
                <label> Confirm Password</label>
                <input type = "password">
            </fieldset>

            <button type = "sumbit">Sumbit</button>
            <button type = "reset"> Reset</button>
        </form>
    </body>
</html>
