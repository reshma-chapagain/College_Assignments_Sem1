<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Enter 1 number</label>
    <input type = "number" id = "num1">
    <label> Enter 2nd Number</label>
    <input type = "number" id = "num2">
    <button onclick = "compare()" > COMPARE TWO NUMBERS</button>
<p id = "result"></p>
    <script>
        function compare() {
        
    let num1 = Number(document.getElementById("num1").value);
    let num2 = Number(document.getElementById("num2").value);

    if (num1 > num2) {
        document.getElementById("result").innerHTML = "Number 1 is greater";
    } 
    else if (num1 < num2) {
       document.getElementById("result").innerHTML = "Number 2 is greater";
    } 
    else {
        document.getElementById("result").innerHTML = "Equal";
    }
}
    </script>
</body>
</html>
