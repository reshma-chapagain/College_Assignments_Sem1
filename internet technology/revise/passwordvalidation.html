<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Password</label>
    <input type = "password" id = "password">
    <label>Confirm Password</label>
    <input type = "password" id = "confipas">
    <button onclick = "validate()">Validate</button>

    <p id = "result"></p>

    <script>
        function validate() {
            let password = document.getElementById("password").value;
            let confirmpassword = document.getElementById("confipas").value;

            if(password === confirmpassword) {
            document.getElementById("result").innerHTML = "password match";}
        else {
            document.getElementById("result").innerHTML = "password doesnt match";
        }

        }
        
    </script>
</body>
</html>
